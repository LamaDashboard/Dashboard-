
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Executive Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:Arial,sans-serif;
color:white;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,122,0,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,122,0,0.04) 1px, transparent 1px);
background-size:45px 45px;
pointer-events:none;
}

.container{
padding:30px;
position:relative;
z-index:2;
max-width:1600px;
margin:auto;
}

.hero{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:20px;
margin-bottom:25px;
}

.hero h1{
font-size:78px;
line-height:0.9;
}

.orange{
color:#ff7a00;
}

.subtitle{
margin-top:15px;
color:#777;
letter-spacing:4px;
}

.upload{
background:rgba(18,18,18,0.96);
padding:24px;
border-radius:28px;
border:1px solid rgba(255,122,0,0.35);
min-width:340px;
backdrop-filter:blur(16px);
}

.upload h3{
margin-bottom:14px;
color:#ff7a00;
}

input[type=file]{
width:100%;
padding:14px;
background:#1a1a1a;
border:none;
border-radius:14px;
color:white;
}

.buttons{
display:flex;
gap:14px;
margin-bottom:25px;
}

.btn{
padding:14px 22px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#ff7a00,#ff5e7e);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 24px rgba(255,122,0,0.25);
}

.page{
display:none;
}

.page.active{
display:block;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:rgba(18,18,18,0.95);
padding:30px;
border-radius:28px;
border:1px solid rgba(255,255,255,0.08);
position:relative;
overflow:hidden;
box-shadow:0 18px 40px rgba(0,0,0,0.35);
}

.card::before{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:5px;
background:linear-gradient(90deg,#ff7a00,#ff5e7e);
}

.card i{
font-size:34px;
color:#ff7a00;
margin-bottom:18px;
}

.card h4{
color:#999;
letter-spacing:3px;
margin-bottom:16px;
}

.card h2{
font-size:44px;
color:#ff7a00;
line-height:1.2;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.panel{
background:rgba(18,18,18,0.95);
padding:26px;
border-radius:28px;
border:1px solid rgba(255,255,255,0.08);
height:520px;
}

.panel h3{
margin-bottom:18px;
color:#ff7a00;
letter-spacing:3px;
}

.chart-wrap{
height:420px;
position:relative;
}

.table-panel{
margin-top:25px;
background:rgba(18,18,18,0.96);
padding:26px;
border-radius:28px;
overflow:auto;
border:1px solid rgba(255,255,255,0.08);
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
padding:16px;
text-align:left;
color:#ff7a00;
border-bottom:1px solid rgba(255,255,255,0.1);
background:#101010;
position:sticky;
top:0;
}

td{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
white-space:nowrap;
}

tr:hover{
background:rgba(255,122,0,0.08);
}

.badge{
padding:8px 14px;
border-radius:999px;
background:rgba(255,122,0,0.12);
border:1px solid rgba(255,122,0,0.4);
color:#ff7a00;
font-size:12px;
font-weight:bold;
}

.footer{
margin-top:30px;
text-align:center;
color:#666;
letter-spacing:3px;
}

@media(max-width:900px){

.hero{
flex-direction:column;
}

.hero h1{
font-size:54px;
}

.grid{
grid-template-columns:1fr;
}

.panel{
height:auto;
}

.chart-wrap{
height:320px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<div>

<h1>
EXECUTIVE<br>
<span class="orange">CLAIMS</span><br>
DASHBOARD
</h1>

<p class="subtitle">
LUXURY FINANCIAL TRACKING SYSTEM
</p>

</div>

<div class="upload">

<h3>
<i class="fa-solid fa-file-excel"></i>
Upload Weekly Excel
</h3>

<input type="file" id="excelFile" accept=".xlsx,.xls">

</div>

</div>

<div class="buttons">

<button class="btn" onclick="showPage('dashboardPage')">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</button>

<button class="btn" onclick="showPage('tablePage')">
<i class="fa-solid fa-table"></i>
Full Breakdown
</button>

</div>

<div id="dashboardPage" class="page active">

<div class="cards">

<div class="card">
<i class="fa-solid fa-users"></i>
<h4>TOTAL EMPLOYEES</h4>
<h2 id="emp">0</h2>
</div>

<div class="card">
<i class="fa-solid fa-file-invoice-dollar"></i>
<h4>TOTAL OUTSTANDING CLAIMS</h4>
<h2 id="claims">SAR 0</h2>
</div>

<div class="card">
<i class="fa-solid fa-scale-balanced"></i>
<h4>NET BALANCE FINAL</h4>
<h2 id="balance">SAR 0</h2>
</div>

</div>

<div class="grid">

<div class="panel">

<h3>
<i class="fa-solid fa-chart-column"></i>
STATUS BREAKDOWN
</h3>

<div class="chart-wrap">
<canvas id="statusChart"></canvas>
</div>

</div>

<div class="panel">

<h3>
<i class="fa-solid fa-earth-americas"></i>
TOP NATIONALITIES
</h3>

<div class="chart-wrap">
<canvas id="natChart"></canvas>
</div>

</div>

</div>

</div>

<div id="tablePage" class="page">

<div class="table-panel">

<h3 style="margin-bottom:18px;color:#ff7a00;">
<i class="fa-solid fa-database"></i>
FULL EXCEL BREAKDOWN
</h3>

<table>

<thead id="thead"></thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<div class="footer">
EXECUTIVE CLAIMS SYSTEM • AUTO REFRESH ENABLED
</div>

</div>

<script>

let statusChart;
let natChart;

function showPage(id){

document.querySelectorAll('.page').forEach(p=>{
p.classList.remove('active');
});

document.getElementById(id).classList.add('active');

}

function cleanNumber(value){

if(!value) return 0;

return Number(
String(value)
.replace(/,/g,'')
.replace(/[^0-9.-]/g,'')
) || 0;

}

function formatSAR(num){

if(num >= 1000000){
return 'SAR ' + (num / 1000000).toFixed(1) + 'M';
}

return 'SAR ' + num.toLocaleString();

}

document.getElementById('excelFile').addEventListener('change',function(e){

const file = e.target.files[0];

const reader = new FileReader();

reader.onload = function(evt){

const data = new Uint8Array(evt.target.result);

const workbook = XLSX.read(data,{type:'array'});

const sheetName = workbook.SheetNames.includes('PENDING AMNT')
? 'PENDING AMNT'
: workbook.SheetNames[0];

const sheet = workbook.Sheets[sheetName];

const rows = XLSX.utils.sheet_to_json(sheet,{
defval:'',
range:1
});

build(rows);

};

reader.readAsArrayBuffer(file);

});

function build(rows){

const cleanRows = rows.filter(r=>Object.keys(r).length > 0);

document.getElementById('emp').innerText = cleanRows.length;

let totalClaims = 0;
let totalBalance = 0;

const statusMap = {};
const natMap = {};

cleanRows.forEach(r=>{

const claims =
cleanNumber(r['TOTAL AMOUNT OF ESB + SAL + OTHER CLAIMS']);

const balance =
cleanNumber(
r['NET BALANCE AMOUNT (FINAL)']
|| r['__EMPTY_21']
|| r['V']
);

totalClaims += claims;
totalBalance += balance;

const status = r['CURRENT STATUS'] || 'Unknown';

statusMap[status] = (statusMap[status] || 0) + 1;

const nat = r['NATIONALITY'] || 'Unknown';

natMap[nat] = (natMap[nat] || 0) + balance;

});

document.getElementById('claims').innerText =
formatSAR(totalClaims);

document.getElementById('balance').innerText =
formatSAR(totalBalance);

if(statusChart){
statusChart.destroy();
}

if(natChart){
natChart.destroy();
}

statusChart = new Chart(document.getElementById('statusChart'),{

type:'bar',

data:{
labels:Object.keys(statusMap),
datasets:[{
data:Object.values(statusMap),

backgroundColor:[
'#ff7a00',
'#ff9f43',
'#ff5e7e',
'#ffb347',
'#ffcc70',
'#ff6b6b',
'#ff8fab'
],

borderRadius:14,
barThickness:26,
maxBarThickness:34
}]
},

options:{
maintainAspectRatio:false,

plugins:{
legend:{
display:false
}
},

layout:{
padding:10
},

scales:{

x:{

ticks:{
color:'#aaa',
maxRotation:20,
minRotation:20
},

grid:{
display:false
}

},

y:{

ticks:{
color:'#aaa'
},

grid:{
color:'rgba(255,255,255,0.04)'
}

}

}

}

});

natChart = new Chart(document.getElementById('natChart'),{

type:'doughnut',

data:{

labels:Object.keys(natMap).slice(0,5),

datasets:[{

data:Object.values(natMap).slice(0,5),

backgroundColor:[
'#ff7a00',
'#ff9f43',
'#ff5e7e',
'#ffb347',
'#ffd166'
],

borderWidth:3,
borderColor:'#111'

}]

},

options:{

maintainAspectRatio:false,

plugins:{

legend:{

labels:{
color:'#fff',
padding:18,
font:{
size:13
}
}

}

},

cutout:'70%'

}

});

buildTable(cleanRows);

}

function buildTable(rows){

const thead = document.getElementById('thead');
const tbody = document.getElementById('tbody');

thead.innerHTML = '';
tbody.innerHTML = '';

if(rows.length === 0){
return;
}

const columns = Object.keys(rows[0]);

let head = '<tr>';

columns.forEach(c=>{
head += `<th>${c}</th>`;
});

head += '</tr>';

thead.innerHTML = head;

rows.forEach(r=>{

let row = '<tr>';

columns.forEach(c=>{

let value = r[c];

if(c === 'CURRENT STATUS'){
value = `<span class="badge">${value}</span>`;
}

row += `<td>${value}</td>`;

});

row += '</tr>';

tbody.innerHTML += row;

});

}

</script>

</body>
</html>
